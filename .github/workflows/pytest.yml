name: Pytest
run-name: >
  ${{ github.event_name == 'pull_request' && 'Full Matrix — PR' || 'Minimal Matrix — Push' }}
  ${{ github.event.pull_request.number || github.ref_name }}

on:
  pull_request:
    branches:
      - "*"
    paths:
      - "pyproject.toml"
      - "py_ballisticcalc/**"
      - "py_ballisticcalc.exts/**"
      - "tests/**"
      - ".gitmodules"
      - ".github/workflows/pytest.yml"
      - ".github/workflows/pytest-reusable.yml"

  push:
    branches:
      - "*"
    paths:
      - "pyproject.toml"
      - "py_ballisticcalc/**"
      - "py_ballisticcalc.exts/**"
      - "tests/**"
      - ".gitmodules"
      - ".github/workflows/pytest.yml"
      - ".github/workflows/pytest-reusable.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decides whether Cython extension changed, to gate the cythonized-engine matrix.
  # Pure-Python engines always run (core py_ballisticcalc code is what they exercise).
  changes:
    runs-on: ubuntu-latest
    outputs:
      exts: ${{ steps.filter.outputs.exts }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            exts:
              - 'py_ballisticcalc.exts/**'
              - '.gitmodules'

  # ---------------------------------------------------------------------------
  # Pure-Python engines: euler_engine, rk4_engine, scipy_engine
  # ---------------------------------------------------------------------------
  test_pure_full_matrix:
    name: Run Full Matrix Tests (Pull Request)
    if: github.event_name == 'pull_request'

    strategy:
      max-parallel: 10
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-15-intel
          - macos-15
        python-version: ["3.11", "3.14", "3.14t"]
        engine: ["euler_engine", "rk4_engine", "scipy_engine"]

    uses: ./.github/workflows/pytest-reusable.yml
    with:
      os: ${{ matrix.os }}
      python_version: ${{ matrix.python-version }}
      engine_name: ${{ matrix.engine }}

  test_pure_minimal_matrix:
    name: Run Minimal Matrix Tests (Push)
    if: github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]
        engine: ["euler_engine", "rk4_engine", "scipy_engine"]

    uses: ./.github/workflows/pytest-reusable.yml
    with:
      os: ${{ matrix.os }}
      python_version: ${{ matrix.python-version }}
      engine_name: ${{ matrix.engine }}

  # ---------------------------------------------------------------------------
  # Cythonized engines: cythonized_euler_engine, cythonized_rk4_engine
  # Only run when py_ballisticcalc.exts/** (or its submodule pin) changed.
  # ---------------------------------------------------------------------------
  test_cythonized_full_matrix:
    name: Run Full Matrix Tests (Pull Request)
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.exts == 'true'

    strategy:
      max-parallel: 10
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-15-intel
          - macos-15
        python-version: ["3.11", "3.14", "3.14t"]
        engine: ["cythonized_euler_engine", "cythonized_rk4_engine"]

    uses: ./.github/workflows/pytest-reusable.yml
    with:
      os: ${{ matrix.os }}
      python_version: ${{ matrix.python-version }}
      engine_name: ${{ matrix.engine }}

  test_cythonized_minimal_matrix:
    name: Run Minimal Matrix Tests (Push)
    needs: changes
    if: github.event_name == 'push' && needs.changes.outputs.exts == 'true'

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]
        engine: ["cythonized_euler_engine", "cythonized_rk4_engine"]

    uses: ./.github/workflows/pytest-reusable.yml
    with:
      os: ${{ matrix.os }}
      python_version: ${{ matrix.python-version }}
      engine_name: ${{ matrix.engine }}
