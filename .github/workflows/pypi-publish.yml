name: Build and Upload Python Package to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish to test pypi"
        required: false
        type: boolean
        default: false
      version:
        description: "Override version (e.g. 2.3.0b1) — required for TestPyPI to get a clean version instead of a dev suffix"
        required: false
        type: string
        default: ''

run-name: >
  Build & Publish → ${{ github.event_name == 'push' && 'PyPI' ||
      github.event_name == 'workflow_dispatch' && inputs.testpypi && 'TestPyPI' ||
      'Build Only' }}

permissions:
  contents: write

jobs:
  create-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        uses: ./.github/actions/gen_release_notes
        with:
          version: ${{ github.ref_name }}

      - name: Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "py-ballisticcalc ${{ github.ref_name }}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            --draft

  build:
    name: Build wheels on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw_archs: "i686,x86_64" # x64 native, i686 over QEMU
            needs_qemu: true

          - os: ubuntu-24.04-arm
            cibw_archs: "aarch64,armv7l" # aarch64
            needs_qemu: false

          - os: windows-latest
            cibw_archs: "x86,AMD64"
            needs_qemu: false

          - os: windows-11-arm
            cibw_archs: "ARM64"
            needs_qemu: false

          - os: macos-15
            cibw_archs: "arm64,universal2"
            needs_qemu: false

          - os: macos-15-intel
            cibw_archs: "x86_64,universal2"
            needs_qemu: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for setuptools-scm
          submodules: recursive

      - name: Set up QEMU for Emulated Architectures
        if: ${{ matrix.needs_qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          github-token: ${{ github.token }}

      - name: Build pure python package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}
        run: uv build --out-dir dist
        shell: bash

      - name: Build binary python package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}
          CIBW_ENVIRONMENT_PASS: SETUPTOOLS_SCM_PRETEND_VERSION
        run: |
          uv build py_ballisticcalc.exts --sdist --out-dir dist
          uvx cibuildwheel py_ballisticcalc.exts --output-dir dist --platform auto --archs ${{ matrix.cibw_archs }}
        shell: bash

      - name: list ./dist
        run: ls ./dist
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}
          path: ./dist
          retention-days: 14

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'pypi' || inputs.testpypi && 'testpypi' || 'build' }}
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts dynamically
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: ./all-dist

      - name: Combine artifacts
        run: |
          mkdir -p dist
          find ./all-dist -type f -exec cp {} dist/ \;
        shell: bash

      - name: list ./dist
        run: ls ./dist
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: ./dist
          retention-days: 14

      - name: Publish package distributions to PyPI
        if: ${{ github.event_name == 'push' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.testpypi == true }}
        with:
          skip-existing: true
          repository-url: https://test.pypi.org/legacy/
