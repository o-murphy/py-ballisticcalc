default_install_hook_types: [pre-commit]
default_language_version:
  python: python3

repos:
  - repo: local
    hooks:
      - id: uv-lock
        name: uv lock check
        entry: uv
        args: ["lock", "--upgrade"]
        language: system
        pass_filenames: false
        files: '^(pyproject\.toml|uv\.lock)$'

      - id: uv-sync
        name: uv sync before hooks
        entry: uv
        args:
          [
            "sync",
            "--extra",
            "exts",
            "--reinstall-package",
            "py_ballisticcalc",
            "--reinstall-package",
            "py_ballisticcalc.exts",
          ]
        language: system
        pass_filenames: false

      - id: uv-pyright
        name: pyright
        entry: uv
        args: ["run", "pyright"]
        language: system
        pass_filenames: false
        files: '\.(py|pyi|pyx|pxd)$'

      - id: uv-ruff-check
        name: ruff lint & fix
        entry: uv
        args: ["run", "ruff", "check", "--fix"]
        language: system
        pass_filenames: false
        files: '\.py$'

      - id: uv-ruff-format
        name: ruff format
        entry: uv
        args: ["run", "ruff", "format"]
        language: system
        pass_filenames: false
        files: '\.py$'

      # - id: uv-audit
      #   name: uv audit
      #   entry: uv
      #   args: ["audit"]
      #   language: system
      #   pass_filenames: false

      - id: uv-cython-lint
        name: cython lint
        entry: uv
        args: ["run", "cython-lint", "--max-line-length", "120"]
        language: system
        pass_filenames: true
        files: '\.(pyx|pxd)$'

